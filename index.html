<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>QC Photo Reference</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f8fafc;
        --border: #e2e8f0;
        --text: #1e293b;
        --muted: #64748b;
        --primary: #1e40af;
        --primary-dark: #1e3a8a;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --danger: #dc2626;
        --header-text: #ffffff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        min-height: 100dvh;
        background: #e8eef7;
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .phone-shell {
        width: 100%; max-width: 430px; min-height: 100dvh;
        margin: 0 auto; background: var(--bg);
        display: flex; flex-direction: column;
      }
      @media (min-width: 431px) {
        .phone-shell {
          box-shadow: 0 25px 50px -12px rgba(30, 64, 175, 0.15);
          border-left: 1px solid var(--border);
          border-right: 1px solid var(--border);
        }
      }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1rem 1.25rem;
        background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
        flex-shrink: 0;
      }
      .header-brand { display: flex; align-items: center; gap: 0.875rem; }
      .header-logo {
        width: 56px; height: 56px; object-fit: contain;
        border-radius: 12px; background: white; padding: 6px;
      }
      header .label {
        font-size: 0.75rem; color: rgba(255,255,255,0.8);
        text-transform: uppercase; letter-spacing: 0.06em;
      }
      header h1 { font-size: 1.1rem; font-weight: 600; color: var(--header-text); }
      main {
        flex: 1; display: flex; flex-direction: column;
        padding: 0 1.25rem 1.5rem; overflow-y: auto; background: var(--bg);
      }
      .btn-text {
        background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
        color: white; font-size: 0.875rem; padding: 0.5rem 0.75rem;
        border-radius: 0.5rem; cursor: pointer;
      }
      .btn-text:hover { background: rgba(255,255,255,0.25); }
      .btn-primary {
        width: 100%; padding: 1.25rem; border: none; border-radius: 0.75rem;
        background: var(--accent); color: white; font-size: 1.25rem;
        font-weight: 600; cursor: pointer;
      }
      .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-secondary {
        padding: 0.5rem 1rem; border-radius: 0.5rem; background: white;
        border: 1px solid var(--accent); color: var(--accent);
        font-size: 0.875rem; cursor: pointer; font-weight: 500;
      }
      .btn-secondary:hover { background: #eff6ff; }
      .btn-danger {
        padding: 0.5rem 1rem; border-radius: 0.5rem; background: #fef2f2;
        border: 1px solid #fecaca; color: var(--danger);
        font-size: 0.875rem; font-weight: 500; cursor: pointer;
      }
      .btn-danger:hover:not(:disabled) { background: var(--danger); color: white; border-color: var(--danger); }
      .field { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
      .field label { font-size: 0.875rem; color: var(--muted); font-weight: 500; }
      .field input {
        width: 100%; padding: 1rem; border-radius: 0.75rem; background: white;
        border: 1px solid var(--border); color: var(--text); font-size: 1rem;
      }
      .field input:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      }
      .field input.lot-input {
        font-size: 1.5rem; font-family: ui-monospace, monospace;
        text-align: center; letter-spacing: 0.1em; text-transform: uppercase;
      }
      .card { padding: 1rem; border-radius: 1rem; background: var(--surface); border: 1px solid var(--border); }
      .error {
        color: #dc2626; font-size: 0.875rem; text-align: center; background: #fef2f2;
        padding: 0.75rem; border-radius: 0.75rem; margin-bottom: 1rem; border: 1px solid #fecaca;
      }
      .success {
        color: #15803d; font-size: 0.875rem; background: #f0fdf4;
        padding: 0.5rem 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; border: 1px solid #bbf7d0;
      }
      .center-content { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 1.25rem; padding-top: 0.5rem; }
      .text-center { text-align: center; }
      .text-muted { color: var(--muted); font-size: 0.875rem; }
      .hero-logo-section {
        display: flex; align-items: center; justify-content: center;
        padding: 1.25rem 0.5rem 0.75rem; flex-shrink: 0;
      }
      .hero-logo-section img,
      .hero-logo {
        width: min(78vw, 300px);
        max-height: 26dvh;
        object-fit: contain;
      }
      .hero-logo-section.login img,
      .hero-logo-section.login .hero-logo {
        width: min(85vw, 340px);
        max-height: 32dvh;
      }
      .hero-logo-section.compact img,
      .hero-logo-section.compact .hero-logo {
        width: min(70vw, 240px);
        max-height: 18dvh;
      }
      .logo-fallback {
        width: 56px; height: 56px; border-radius: 12px; background: white;
        color: var(--primary); font-weight: 700; font-size: 1.5rem;
        align-items: center; justify-content: center;
      }
      .hero-logo-section .logo-fallback {
        width: min(78vw, 300px); height: min(78vw, 300px); max-height: 26dvh;
        font-size: 4rem; border-radius: 1.5rem;
      }
      .login-title { font-size: 1.25rem; margin-bottom: 0.25rem; color: var(--primary); }
      .card-title { font-weight: 600; color: var(--primary); }
      .small { font-size: 0.75rem; }
      .list-title { font-size: 0.875rem; font-weight: 600; }
      .empty-state { padding: 2rem 0; }
      .photo-gallery { display: flex; flex-direction: column; gap: 1rem; }
      .photo-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; text-align: center; }
      .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; width: 100%; }
      .preview-item { position: relative; border-radius: 0.5rem; overflow: hidden; border: 1px solid var(--border); }
      .preview-item img { width: 100%; height: 5rem; object-fit: cover; }
      .preview-item span {
        position: absolute; top: 4px; left: 4px; background: var(--accent);
        color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px;
      }
      .photo-view { display: flex; flex-direction: column; gap: 1rem; flex: 1; }
      .photo-header { display: flex; align-items: center; justify-content: space-between; }
      .lot-display {
        font-family: ui-monospace, monospace; font-size: 1.5rem; font-weight: 700;
        letter-spacing: 0.05em; color: var(--primary);
      }
      .photo-frame {
        border-radius: 1rem; overflow: hidden; background: #f1f5f9;
        border: 1px solid var(--border); padding: 0.75rem;
      }
      .photo-frame img { width: 100%; max-height: 60dvh; object-fit: contain; display: block; }
      .file-input-hidden {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); border: 0;
      }
      .qc-tabs {
        display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        margin-bottom: 1rem; flex-shrink: 0;
      }
      .qc-tab {
        padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--border);
        background: white; color: var(--muted); font-size: 0.95rem; font-weight: 600;
        cursor: pointer;
      }
      .qc-tab.active {
        background: var(--accent); color: white; border-color: var(--accent);
      }
      .qc-panel { display: flex; flex-direction: column; gap: 1rem; flex: 1; min-height: 0; }
      .upload-zone {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0.5rem; padding: 1.25rem 1rem; border-radius: 0.75rem;
        border: 2px dashed #93c5fd; background: #eff6ff;
        -webkit-tap-highlight-color: transparent; user-select: none;
        min-height: 7rem;
      }
      .upload-icon { font-size: 2rem; line-height: 1; }
      .upload-hint { color: var(--muted); font-size: 0.8rem; text-align: center; }
      .btn-pick-files {
        width: 100%; padding: 0.875rem; border-radius: 0.75rem;
        background: white; border: 1px solid var(--accent); color: var(--accent);
        font-size: 1rem; font-weight: 600; cursor: pointer;
      }
      .btn-pick-files:active { background: #eff6ff; }
      .btn-save-qc { font-size: 1rem; padding: 0.875rem; }
      .photo-frame.zoomable { cursor: zoom-in; }
      .photo-frame.zoomable:active { opacity: 0.9; }
      .lightbox {
        position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.92); display: flex;
        align-items: center; justify-content: center;
        padding: 1rem; touch-action: none;
      }
      .lightbox img {
        max-width: 100%; max-height: 100%; object-fit: contain;
        transform-origin: center center; transition: transform 0.15s ease;
      }
      .lightbox-close {
        position: fixed; top: 1rem; right: 1rem; z-index: 10000;
        width: 2.5rem; height: 2.5rem; border-radius: 50%;
        background: rgba(255,255,255,0.2); border: none; color: white;
        font-size: 1.25rem; cursor: pointer;
      }
      .lightbox-hint {
        position: fixed; bottom: 1.25rem; left: 0; right: 0;
        text-align: center; color: rgba(255,255,255,0.7); font-size: 0.8rem;
      }
      .photo-list { display: flex; flex-direction: column; gap: 0.75rem; }
      .photo-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1rem; border-radius: 0.75rem; background: white; border: 1px solid var(--border);
      }
      .photo-item .lot { font-family: ui-monospace, monospace; font-weight: 700; font-size: 1.125rem; color: var(--primary); }
      .hidden { display: none !important; }
      .gap-6 { display: flex; flex-direction: column; gap: 1.5rem; }
    </style>
  </head>
  <body>
    <div id="app" class="phone-shell"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
    <script>
      // ====== ตั้งค่า Supabase (แก้ได้ที่นี่) ======
      window.SUPABASE_URL = "https://izecltrjelhmmpauyryy.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_P7jS8drUKuro97IMlHRywQ__DjB1XxK";
    </script>
    <script>
      const { createClient } = supabase;

      const LOGO_PATH = "logo.png";
      const MAX_PHOTOS_PER_LOT = 3;

      let client = null;
      let currentUser = null;
      let currentRole = "user";
      let qcActiveTab = "upload";

      function getClient() {
        if (!client) {
          if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY || window.SUPABASE_URL.includes("xxxxxxxx")) {
            throw new Error("กรุณาตั้งค่า Supabase URL/Key ก่อนใช้งาน");
          }
          client = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true },
          });
        }
        return client;
      }

      function logoImg(className) {
        return `<img src="${LOGO_PATH}" alt="Logo" class="${className}" onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')" /><span class="logo-fallback" style="display:none">H</span>`;
      }

      function logoHero(extraClass = "") {
        return `<div class="hero-logo-section ${extraClass}">${logoImg("hero-logo")}</div>`;
      }

      function shell(title, bodyHtml, showLogout = true) {
        return `
          <header>
            <div class="header-brand">
              ${logoImg("header-logo")}
              <div>
                <p class="label">HEXA QC</p>
                <h1>${title}</h1>
              </div>
            </div>
            ${showLogout ? '<button class="btn-text" id="logout-btn">ออก</button>' : ""}
          </header>
          <main>${bodyHtml}</main>
        `;
      }

      function showError(el, msg) { el.innerHTML = `<p class="error">${msg}</p>`; }

      function formatDate(iso) {
        return new Date(iso).toLocaleDateString("th-TH", {
          year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit",
        });
      }

      async function ensureSession() {
        const sb = getClient();
        let { data: { session } } = await sb.auth.getSession();
        if (!session) throw new Error("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่");

        const expiresSoon = session.expires_at * 1000 - Date.now() < 120000;
        if (expiresSoon) {
          const { data, error } = await sb.auth.refreshSession();
          if (error || !data.session) throw new Error("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่");
          session = data.session;
        }
        return session;
      }

      function isImageFile(file) {
        if (file.type && file.type.startsWith("image/")) return true;
        return /\.(jpe?g|png|webp|heic|heif|gif)$/i.test(file.name);
      }

      function formatFileSize(bytes) {
        if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
      }

      async function compressImage(file) {
        const MAX_EDGE = 1600;
        const QUALITY = 0.82;

        if (file.size < 400 * 1024 && file.type === "image/jpeg") return file;

        return new Promise((resolve) => {
          const img = new Image();
          const url = URL.createObjectURL(file);

          img.onload = () => {
            URL.revokeObjectURL(url);
            let { width, height } = img;

            if (width > MAX_EDGE || height > MAX_EDGE) {
              if (width >= height) {
                height = Math.round((height * MAX_EDGE) / width);
                width = MAX_EDGE;
              } else {
                width = Math.round((width * MAX_EDGE) / height);
                height = MAX_EDGE;
              }
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              (blob) => {
                if (!blob) {
                  resolve(file);
                  return;
                }
                const name = file.name.replace(/\.[^.]+$/, "") + ".jpg";
                resolve(new File([blob], name, { type: "image/jpeg" }));
              },
              "image/jpeg",
              QUALITY
            );
          };

          img.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(file);
          };

          img.src = url;
        });
      }

      async function uploadToStorage(path, file) {
        const contentType = file.type || "image/jpeg";
        let lastError = null;

        for (let attempt = 0; attempt < 3; attempt++) {
          try {
            const { error } = await getClient()
              .storage.from("qc-photos")
              .upload(path, file, { contentType, upsert: false, cacheControl: "3600" });

            if (!error) return;
            lastError = error;
          } catch (err) {
            lastError = err;
          }

          if (attempt < 2) await new Promise((r) => setTimeout(r, 1200));
        }

        throw lastError || new Error("อัปโหลดไม่สำเร็จ");
      }

      function getUploadErrorMessage(err) {
        const msg = (err?.message || String(err)).toLowerCase();

        if (msg.includes("fetch") || msg.includes("network") || msg.includes("load failed")) {
          return "อัปโหลดจากมือถือไม่สำเร็จ — ลองใช้ Wi-Fi ที่เสถียร หรือถ่ายรูปใหม่แล้วลองอีกครั้ง";
        }
        if (msg.includes("jwt") || msg.includes("session") || msg.includes("401")) {
          return "เซสชันหมดอายุ กรุณาออกแล้วเข้าสู่ระบบใหม่";
        }
        if (msg.includes("row-level security") || msg.includes("403")) {
          return "ไม่มีสิทธิ์อัปโหลด — ตรวจว่าเป็น QC และรัน fix-upload.sql";
        }

        return err?.message || "อัปโหลดไม่สำเร็จ";
      }

      function openLightbox(url, alt) {
        const existing = document.querySelector(".lightbox");
        if (existing) existing.remove();

        const lb = document.createElement("div");
        lb.className = "lightbox";
        lb.innerHTML = `
          <button class="lightbox-close" aria-label="ปิด">✕</button>
          <img src="${url}" alt="${alt || "รูป QC"}" />
          <p class="lightbox-hint">แตะ 2 ครั้งเพื่อซูม · ลากเพื่อเลื่อน · แตะพื้นหลังเพื่อปิด</p>
        `;
        document.body.appendChild(lb);

        const img = lb.querySelector("img");
        let scale = 1;
        let lastTap = 0;
        let startX = 0, startY = 0, translateX = 0, translateY = 0;
        let isDragging = false;
        let pinchStartDist = 0;
        let pinchStartScale = 1;

        function applyTransform() {
          img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function closeLb() { lb.remove(); }

        lb.querySelector(".lightbox-close").addEventListener("click", closeLb);
        lb.addEventListener("click", (e) => { if (e.target === lb) closeLb(); });

        img.addEventListener("dblclick", (e) => {
          e.preventDefault();
          scale = scale === 1 ? 2.5 : 1;
          if (scale === 1) { translateX = 0; translateY = 0; }
          applyTransform();
        });

        img.addEventListener("click", (e) => {
          e.stopPropagation();
          const now = Date.now();
          if (now - lastTap < 300) {
            scale = scale === 1 ? 2.5 : 1;
            if (scale === 1) { translateX = 0; translateY = 0; }
            applyTransform();
          }
          lastTap = now;
        });

        img.addEventListener("touchstart", (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStartDist = Math.hypot(dx, dy);
            pinchStartScale = scale;
          } else if (e.touches.length === 1 && scale > 1) {
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
          }
        }, { passive: true });

        img.addEventListener("touchmove", (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            scale = Math.min(4, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
            applyTransform();
          } else if (isDragging && e.touches.length === 1) {
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            applyTransform();
          }
        }, { passive: true });

        img.addEventListener("touchend", () => { isDragging = false; });
      }

      // ─── Login ───
      function renderLogin(errorMsg = "") {
        const app = document.getElementById("app");
        app.innerHTML = shell(
          "เข้าสู่ระบบ",
          `
          <div class="center-content">
            <form id="login-form" class="gap-6" style="width:100%">
              ${logoHero("login")}
              <div class="text-center">
                <h2 class="login-title">เข้าสู่ระบบ</h2>
                <p class="text-muted">ดูรูปอ้างอิง QC ตาม Lot No.</p>
              </div>
              ${errorMsg ? `<p class="error">${errorMsg}</p>` : ""}
              <div class="field">
                <label for="email">อีเมล</label>
                <input id="email" type="email" required placeholder="your@email.com" autocomplete="email" />
              </div>
              <div class="field">
                <label for="password">รหัสผ่าน</label>
                <input id="password" type="password" required placeholder="••••••••" autocomplete="current-password" />
              </div>
              <button type="submit" class="btn-primary" id="login-btn">เข้าสู่ระบบ</button>
            </form>
          </div>
          `,
          false
        );

        document.getElementById("login-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("login-btn");
          btn.disabled = true;
          btn.textContent = "กำลังเข้าสู่ระบบ...";

          try {
            const rawEmail = document.getElementById("email").value.trim().toLowerCase();
            const email = rawEmail.includes("@") ? rawEmail : `${rawEmail}@hexarpd.com`;
            const password = document.getElementById("password").value;
            const { error } = await getClient().auth.signInWithPassword({ email, password });
            if (error) {
              const m = (error.message || "").toLowerCase();
              if (m.includes("email not confirmed")) {
                renderLogin("บัญชียังไม่ยืนยันอีเมล — ให้แอดมินเปิด Auto Confirm ใน Supabase");
              } else if (m.includes("invalid login credentials")) {
                renderLogin("อีเมลหรือรหัสผ่านไม่ถูกต้อง (ตรวจใน Supabase > Authentication > Users)");
              } else {
                renderLogin(`เข้าสู่ระบบไม่สำเร็จ: ${error.message}`);
              }
              return;
            }
            await initApp();
          } catch (err) {
            renderLogin(err.message || "เข้าสู่ระบบไม่สำเร็จ");
          }
        });
      }

      // ─── Search (User) ───
      function renderSearch() {
        const app = document.getElementById("app");
        app.innerHTML = shell(
          "ค้นหารูป QC",
          `
          <div class="center-content" id="search-view">
            ${logoHero()}
            <div class="text-center">
              <p class="text-muted">ใส่ Lot No. / SO</p>
              <p class="text-muted">เพื่อดูรูปอ้างอิงจาก QC</p>
            </div>
            <form id="search-form">
              <div id="search-error"></div>
              <div class="field">
                <label for="lotNo">Lot No. / SO</label>
                <input id="lotNo" class="lot-input" type="text" required placeholder="SO-12345" autocomplete="off" />
              </div>
              <button type="submit" class="btn-primary" id="search-btn">OK</button>
            </form>
          </div>
          `
        );

        document.getElementById("logout-btn").addEventListener("click", handleLogout);

        document.getElementById("search-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("search-btn");
          const errorEl = document.getElementById("search-error");
          errorEl.innerHTML = "";

          const lotNo = document.getElementById("lotNo").value.trim().toUpperCase();
          if (!lotNo) return;

          btn.disabled = true;
          btn.textContent = "กำลังค้นหา...";

          try {
            const { data: photos, error } = await getClient()
              .from("photos").select("*").eq("lot_no", lotNo)
              .order("created_at", { ascending: true });

            if (error || !photos?.length) {
              showError(errorEl, `ไม่พบรูปสำหรับ SO: ${lotNo}`);
              return;
            }

            const urls = [];
            for (const photo of photos) {
              const { data: signed, error: signErr } = await getClient()
                .storage.from("qc-photos").createSignedUrl(photo.storage_path, 3600);
              if (!signErr && signed?.signedUrl) urls.push(signed.signedUrl);
            }

            if (!urls.length) {
              showError(errorEl, "ไม่สามารถโหลดรูปได้ กรุณาลองใหม่");
              return;
            }

            renderPhotoView(lotNo, photos, urls);
          } catch (err) {
            showError(errorEl, err.message || "ค้นหาไม่สำเร็จ");
          } finally {
            btn.disabled = false;
            btn.textContent = "OK";
          }
        });
      }

      function renderPhotoView(lotNo, photos, imageUrls) {
        const app = document.getElementById("app");
        app.innerHTML = shell(
          "ค้นหารูป QC",
          `
          <div class="photo-view">
            ${logoHero("compact")}
            <div class="photo-header">
              <div>
                <p class="text-muted small">SO / Lot No.</p>
                <p class="lot-display">${lotNo}</p>
              </div>
              <button class="btn-secondary" id="back-btn">ค้นหาใหม่</button>
            </div>
            <p class="text-muted small">${imageUrls.length} รูป · อัปโหลด ${formatDate(photos[0].created_at)}</p>
            <div class="photo-gallery">
              ${imageUrls.map((url, i) => `
                <div class="photo-frame zoomable" data-zoom-url="${url}" data-zoom-alt="QC ${lotNo} - ${i + 1}">
                  <p class="photo-label">รูปที่ ${i + 1} · แตะเพื่อซูม</p>
                  <img src="${url}" alt="QC ${lotNo} - ${i + 1}" />
                </div>
              `).join("")}
            </div>
            <p class="text-center text-muted">เปรียบเทียบกับงานปัจจุบันของคุณ</p>
          </div>
          `
        );

        document.getElementById("logout-btn").addEventListener("click", handleLogout);
        document.getElementById("back-btn").addEventListener("click", renderSearch);
        document.querySelectorAll("[data-zoom-url]").forEach((el) => {
          el.addEventListener("click", () => openLightbox(el.dataset.zoomUrl, el.dataset.zoomAlt));
        });
      }

      function switchQCTab(tab) {
        qcActiveTab = tab;
        document.querySelectorAll(".qc-tab").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.tab === tab);
        });
        document.getElementById("qc-upload-panel").classList.toggle("hidden", tab !== "upload");
        document.getElementById("qc-list-panel").classList.toggle("hidden", tab !== "list");
        if (tab === "list") loadPhotoList();
      }

      // ─── QC Dashboard ───
      function renderQC() {
        const app = document.getElementById("app");
        app.innerHTML = shell(
          "QC Dashboard",
          `
          ${logoHero()}
          <div class="qc-tabs">
            <button type="button" class="qc-tab ${qcActiveTab === "upload" ? "active" : ""}" data-tab="upload">อัปโหลด</button>
            <button type="button" class="qc-tab ${qcActiveTab === "list" ? "active" : ""}" data-tab="list">รายการ</button>
          </div>

          <div id="qc-upload-panel" class="qc-panel ${qcActiveTab === "list" ? "hidden" : ""}">
            <form id="upload-form" class="card gap-6">
              <h3 class="card-title">เพิ่มรูป QC ใหม่</h3>
              <div id="upload-msg"></div>
              <div class="field" style="margin-bottom:0.75rem">
                <label for="uploadLot">Lot No. / SO</label>
                <input id="uploadLot" class="lot-input" type="text" required placeholder="SO-12345" style="font-size:1.1rem;padding:0.75rem" />
              </div>
              <div class="field" style="margin-bottom:0.5rem">
                <label>รูปภาพ (สูงสุด ${MAX_PHOTOS_PER_LOT} รูปต่อ SO)</label>
                <div class="upload-zone" id="upload-zone">
                  <div id="upload-placeholder">
                    <span class="upload-icon">📷</span>
                    <span class="upload-hint">เลือกรูป 1-${MAX_PHOTOS_PER_LOT} รูป</span>
                  </div>
                  <div id="preview-grid" class="preview-grid hidden"></div>
                </div>
                <button type="button" class="btn-pick-files" id="pick-files-btn">เลือกรูปจากเครื่อง</button>
                <input id="uploadFile" type="file" accept="image/*" multiple class="file-input-hidden" />
              </div>
              <button type="submit" class="btn-primary btn-save-qc" id="upload-btn" disabled>
                บันทึกรูป QC
              </button>
            </form>
          </div>

          <div id="qc-list-panel" class="qc-panel ${qcActiveTab === "upload" ? "hidden" : ""}">
            <div id="photo-list"><p class="text-center text-muted">กำลังโหลด...</p></div>
          </div>
          `
        );

        document.getElementById("logout-btn").addEventListener("click", handleLogout);
        document.querySelectorAll(".qc-tab").forEach((btn) => {
          btn.addEventListener("click", () => switchQCTab(btn.dataset.tab));
        });

        let selectedFiles = [];
        const fileInput = document.getElementById("uploadFile");
        const uploadBtn = document.getElementById("upload-btn");
        const uploadPlaceholder = document.getElementById("upload-placeholder");
        const previewGrid = document.getElementById("preview-grid");
        const pickBtn = document.getElementById("pick-files-btn");

        pickBtn.addEventListener("click", () => fileInput.click());

        function updateUploadBtn() {
          uploadBtn.disabled = !document.getElementById("uploadLot").value.trim() || selectedFiles.length === 0;
        }

        function renderPreviews() {
          if (!selectedFiles.length) {
            previewGrid.classList.add("hidden");
            previewGrid.innerHTML = "";
            uploadPlaceholder.classList.remove("hidden");
            return;
          }
          uploadPlaceholder.classList.add("hidden");
          previewGrid.classList.remove("hidden");
          previewGrid.innerHTML = selectedFiles
            .map((f, i) => `<div class="preview-item"><img src="${URL.createObjectURL(f)}" alt="preview ${i + 1}" /><span>${i + 1}</span></div>`)
            .join("");
        }

        fileInput.addEventListener("change", (e) => {
          const msgEl = document.getElementById("upload-msg");
          msgEl.innerHTML = "";

          const files = Array.from(e.target.files || []);
          if (!files.length) return;

          const valid = files.filter((f) => isImageFile(f));
          if (valid.length !== files.length) {
            msgEl.innerHTML = '<p class="error">เลือกได้เฉพาะไฟล์รูปภาพ</p>';
          }

          selectedFiles = valid.slice(0, MAX_PHOTOS_PER_LOT);
          if (files.length > MAX_PHOTOS_PER_LOT) {
            msgEl.innerHTML = `<p class="error">เลือกได้สูงสุด ${MAX_PHOTOS_PER_LOT} รูป</p>`;
          } else if (valid.some((f) => f.size > 8 * 1024 * 1024)) {
            msgEl.innerHTML = '<p class="success">รูปใหญ่จะถูกบีบอัดอัตโนมัติก่อนอัปโหลด</p>';
          }

          renderPreviews();
          updateUploadBtn();
        });

        document.getElementById("uploadLot").addEventListener("input", updateUploadBtn);

        document.getElementById("upload-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const msgEl = document.getElementById("upload-msg");
          msgEl.innerHTML = "";

          const lotNo = document.getElementById("uploadLot").value.trim().toUpperCase();
          if (!lotNo || !selectedFiles.length) return;

          uploadBtn.disabled = true;
          uploadBtn.textContent = "กำลังอัปโหลด...";

          try {
            await ensureSession();

            const { count } = await getClient()
              .from("photos").select("*", { count: "exact", head: true }).eq("lot_no", lotNo);

            const existing = count || 0;
            if (existing + selectedFiles.length > MAX_PHOTOS_PER_LOT) {
              throw new Error(`SO ${lotNo} มีรูปอยู่ ${existing} รูปแล้ว เพิ่มได้อีก ${MAX_PHOTOS_PER_LOT - existing} รูป`);
            }

            for (let i = 0; i < selectedFiles.length; i++) {
              uploadBtn.textContent = `กำลังเตรียมรูป ${i + 1}/${selectedFiles.length}...`;

              const original = selectedFiles[i];
              const file = await compressImage(original);
              const ext = "jpg";
              const storagePath = `${lotNo}/${Date.now()}_${i}.${ext}`;

              uploadBtn.textContent = `กำลังอัปโหลด ${i + 1}/${selectedFiles.length}...`;

              try {
                await uploadToStorage(storagePath, file);
              } catch (uploadErr) {
                throw new Error(
                  `อัปโหลดรูปที่ ${i + 1} ไม่สำเร็จ (${formatFileSize(original.size)} → ${formatFileSize(file.size)}): ${getUploadErrorMessage(uploadErr)}`
                );
              }

              const { error: insertErr } = await getClient().from("photos").insert({
                lot_no: lotNo, storage_path: storagePath, uploaded_by: currentUser.id,
              });

              if (insertErr) {
                await getClient().storage.from("qc-photos").remove([storagePath]);
                throw new Error(`บันทึกรูปที่ ${i + 1} ไม่สำเร็จ`);
              }
            }

            msgEl.innerHTML = `<p class="success">บันทึก SO ${lotNo} สำเร็จ ${selectedFiles.length} รูป</p>`;
            document.getElementById("uploadLot").value = "";
            selectedFiles = [];
            fileInput.value = "";
            renderPreviews();
            switchQCTab("list");
          } catch (err) {
            msgEl.innerHTML = `<p class="error">${getUploadErrorMessage(err)}</p>`;
          } finally {
            uploadBtn.textContent = "บันทึกรูป QC";
            updateUploadBtn();
          }
        });

        if (qcActiveTab === "list") loadPhotoList();
      }

      async function loadPhotoList() {
        const listEl = document.getElementById("photo-list");
        if (!listEl) return;
        const { data: photos } = await getClient()
          .from("photos").select("*").order("created_at", { ascending: false });

        if (!photos?.length) {
          listEl.innerHTML = `<div class="text-center empty-state"><p class="text-muted">ยังไม่มีรูป QC</p></div>`;
          return;
        }

        listEl.innerHTML = `
          <p class="text-muted list-title">รายการทั้งหมด (${photos.length})</p>
          <div class="photo-list">
            ${photos.map((p) => `
              <div class="photo-item">
                <div>
                  <p class="lot">${p.lot_no}</p>
                  <p class="text-muted small">${formatDate(p.created_at)}</p>
                </div>
                <button class="btn-danger" data-delete="${p.id}" data-lot="${p.lot_no}" data-path="${p.storage_path}">ลบ</button>
              </div>
            `).join("")}
          </div>
        `;

        listEl.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            if (!confirm(`ลบรูป SO ${btn.dataset.lot}?`)) return;
            btn.disabled = true;
            await getClient().storage.from("qc-photos").remove([btn.dataset.path]);
            await getClient().from("photos").delete().eq("id", btn.dataset.delete);
            loadPhotoList();
          });
        });
      }

      async function handleLogout() {
        await getClient().auth.signOut();
        currentUser = null;
        renderLogin();
      }

      async function getProfile(userId) {
        const { data } = await getClient().from("profiles").select("role").eq("id", userId).single();
        return data?.role || "user";
      }

      async function initApp() {
        try {
          getClient();
        } catch (err) {
          renderLogin(err.message);
          return;
        }

        const { data: { session } } = await getClient().auth.getSession();
        if (!session?.user) { renderLogin(); return; }

        currentUser = session.user;
        currentRole = await getProfile(currentUser.id);
        currentRole === "qc" ? renderQC() : renderSearch();
      }

      initApp().catch((err) => {
        document.getElementById("app").innerHTML = shell("ข้อผิดพลาด", `<p class="error">${err.message}</p>`, false);
      });
    </script>
  </body>
</html>
